name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      # -------------------------------------------------------
      # 1. Checkout (including all module submodules)
      # -------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -------------------------------------------------------
      # 2. Set up SSH
      # -------------------------------------------------------
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.SERVER_IP }} >> ~/.ssh/known_hosts

      # -------------------------------------------------------
      # 3. Build React frontend
      # -------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: core/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: core/frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: core/frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_ENV: production
          VITE_API_URL: https://${{ vars.DOMAIN }}
          VITE_WS_URL: wss://${{ vars.DOMAIN }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_RELEASE_VERSION: ${{ github.sha }}

      # -------------------------------------------------------
      # 4. Push entire app (code + built frontend) to server
      # -------------------------------------------------------
      - name: Push app to server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='venv' \
            --exclude='core/backend/staticfiles' \
            --exclude='core/backend/media' \
            ./ \
            root@${{ vars.SERVER_IP }}:/var/www/beta.peeldev.com/

      # -------------------------------------------------------
      # 5. Install deps, regen manifests, migrate, restart
      # -------------------------------------------------------
      - name: Activate site
        env:
          SECRET_KEY: ${{ secrets.SENTRY_KEY }}
        run: |
          ssh root@${{ vars.SERVER_IP }} << 'EOF'
            set -e
            APP_DIR=/var/www/beta.peeldev.com

            echo "--- Regenerating module manifests ---"
            cd $APP_DIR
            source venv/bin/activate
            python install.py regen

            echo "--- Installing Python dependencies ---"
            pip install -r core/backend/requirements.txt --quiet

            echo "--- Running migrations ---"
            DJANGO_SETTINGS_MODULE=core.settings.production \
              python core/backend/manage.py migrate --no-input

            echo "--- Collecting static files ---"
            DJANGO_SETTINGS_MODULE=core.settings.production \
              python core/backend/manage.py collectstatic --no-input

            echo "--- Setting permissions ---"
            chown -R www-data:www-data $APP_DIR

            echo "--- Restarting uvicorn ---"
            systemctl restart uvicorn-heyhello.art

            echo "--- Deploy complete ---"
          EOF

      # -------------------------------------------------------
      # 6. Smoke test
      # -------------------------------------------------------
      - name: Smoke test
        run: |
          sleep 5
          curl --fail --silent --output /dev/null \
            --write-out "HTTP %{http_code}" \
            https://${{ vars.DOMAIN }}
          echo " — site is up"
